<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — EDU LINK HUB</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .offline-card {
      background: #1a1a1a;
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 24px;
      padding: 56px 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 0 60px rgba(108,99,255,0.15);
    }
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.95); opacity: 0.8; }
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #4ecca3);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    p {
      color: #aaa;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      background: linear-gradient(135deg, #6c63ff, #4ecca3);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,0.4);
    }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <div class="brand">EDU LINK HUB</div>
    <p>It looks like you've lost your internet connection. Check your connection and try again.</p>
    <button onclick="window.location.reload()">↺ Try Again</button>
  </div>
</body>
</html>
