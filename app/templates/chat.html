{% extends "base.html" %}
{% block title %}Chat - EDU Link Hub{% endblock %}

{% block body %}
<div class="app-layout">
  {% include "partials/sidebar.html" %}
  <div class="main-content">
    {% include "partials/navbar.html" %}

    <div class="chat-layout">
      <!-- Channels Sidebar -->
      <aside class="chat-sidebar" id="chatSidebar">
        <div class="chat-sidebar-section">
          <h3 class="chat-sidebar-heading"># Channels</h3>
          <div id="channelList">
            <div class="spinner" style="transform:scale(0.5)"></div>
          </div>
        </div>

        <div class="chat-sidebar-section">
          <h3 class="chat-sidebar-heading">⊠ Actions</h3>
          <a href="/community" class="chat-action-link">← Back to Q&A Feed</a>
        </div>
      </aside>

      <!-- Chat Main Area -->
      <main class="chat-main">
        <div class="chat-header" id="chatHeader">
          <h2 id="channelName">Loading...</h2>
          <p id="channelDesc"></p>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="spinner"></div>
        </div>

        <!-- Fix 4: Reply Preview Bar -->
        <div id="reply-preview">
          <span id="reply-text"></span>
          <button onclick="cancelReply()" 
            style="position:absolute; right:10px; top:50%; transform:translateY(-50%); 
            background:none; border:none; color:#ff2a6d; cursor:pointer; font-size:16px;">✕</button>
        </div>

        <form class="chat-input-bar" id="chatForm" onsubmit="sendMessage(event)">
          <input type="text" id="chatInput" placeholder="Reply..." autocomplete="off" required>
          <button type="submit" class="chat-send-btn" title="Send">➤</button>
        </form>
      </main>
    </div>
  </div>
</div>

<style>
  /* ─── Chat Layout ─── */
  .chat-layout {
    display: flex;
    height: calc(100vh - var(--navbar-height));
    overflow: hidden;
  }

  /* ─── Chat Sidebar ─── */
  .chat-sidebar {
    width: 240px;
    min-width: 240px;
    background: rgba(5, 12, 25, 0.9);
    border-right: 2px solid var(--accent);
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    overflow-y: auto;
  }

  .chat-sidebar-section {
    padding: 0 16px;
    margin-bottom: 28px;
  }

  .chat-sidebar-heading {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(5, 217, 232, 0.15);
  }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
    text-decoration: none;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .channel-item:hover {
    background: rgba(5, 217, 232, 0.08);
    color: var(--accent);
    border-color: rgba(5, 217, 232, 0.15);
  }
  .channel-item.active {
    background: rgba(5, 217, 232, 0.12);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
    box-shadow: inset 0 0 15px rgba(5, 217, 232, 0.05);
  }

  .channel-hash {
    color: var(--accent);
    font-weight: 700;
    font-size: 16px;
    opacity: 0.6;
  }

  .chat-action-link {
    display: block;
    padding: 10px 14px;
    color: var(--text-secondary);
    font-size: 13px;
    text-decoration: none;
    border-radius: var(--radius-sm);
    transition: var(--transition);
  }
  .chat-action-link:hover {
    color: var(--primary);
    background: rgba(255, 42, 109, 0.08);
  }

  /* ─── Chat Main ─── */
  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: rgba(1, 10, 19, 0.5);
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(5, 12, 25, 0.8);
  }
  .chat-header h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    color: var(--text-primary);
    margin: 0;
  }
  .chat-header p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── Messages ─── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .chat-msg {
    padding: 8px 0;
    display: flex;
    gap: 12px;
    animation: msgFadeIn 0.3s ease;
    position: relative;
  }
  .chat-msg:hover .msg-menu-btn { opacity: 1; }

  .msg-menu-btn {
    opacity: 0; position: absolute; right: 8px; top: 8px;
    background: none; border: none; color: #05d9e8;
    cursor: pointer; font-size: 16px; transition: opacity 0.2s;
    z-index: 10;
  }

  .msg-dropdown {
    display: none; position: absolute; right: 0; top: 28px;
    background: #0d1b2a; border: 1px solid #05d9e8;
    border-radius: 8px; min-width: 140px; z-index: 999; padding: 4px 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .msg-dropdown.show { display: block; }
  .msg-dropdown a {
    display: block; padding: 8px 16px; color: #fff;
    font-size: 13px; cursor: pointer; text-decoration: none;
    transition: 0.2s;
  }
  .msg-dropdown a:hover { background: #1a2a3a; color: #05d9e8; }
  .msg-dropdown a.danger:hover { color: #ff2a6d; }

  /* ═══ Fix 4: Reply Preview ═══ */
  #reply-preview {
    display: none; background: #1a2a3a; border-left: 3px solid #05d9e8;
    padding: 8px 12px; margin: 0 0 4px; border-radius: 0 6px 6px 0; 
    font-size: 12px; color: #aaa; position: relative;
  }
  #reply-preview #reply-text {
    display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
    padding-right: 20px;
  }
  @keyframes msgFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #010a13;
    flex-shrink: 0;
    font-family: 'Rajdhani', sans-serif;
  }

  .msg-body {
    min-width: 0;
  }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 2px;
  }

  .msg-author {
    font-weight: 700;
    font-size: 14px;
    color: var(--primary-light);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.5px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  .msg-content {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.5;
    word-break: break-word;
  }

  /* ─── Input Bar ─── */
  .chat-input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    background: rgba(5, 12, 25, 0.8);
  }

  .chat-input-bar input {
    flex: 1;
    padding: 12px 16px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: var(--transition);
  }
  .chat-input-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(5, 217, 232, 0.15);
  }

  .chat-send-btn {
    width: 44px;
    height: 44px;
    border: 2px solid var(--accent);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--accent);
    font-size: 18px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-send-btn:hover {
    background: rgba(5, 217, 232, 0.15);
    box-shadow: var(--cyber-glow);
  }

  /* ─── Reply Bar ─── */
  .reply-bar {
    background: rgba(15, 25, 45, 0.95);
    border-left: 4px solid #ffaa00;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    border-top: 1px solid var(--border);
    animation: slideUp 0.2s ease;
  }
  .reply-content { flex: 1; min-width: 0; }
  .reply-author-name { font-size: 11px; font-weight: 700; color: #ffaa00; margin-bottom: 2px; }
  .reply-text-snippet { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .reply-close-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; transition: 0.2s; }
  .reply-close-btn:hover { color: #ff4757; }

  /* ─── Msg Reply Link ─── */
  .msg-reply-link {
    background: rgba(255,170,0,0.05);
    border-left: 3px solid #ffaa00;
    padding: 8px 12px;
    margin-bottom: 8px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .msg-reply-link:hover { background: rgba(255,170,0,0.1); }
  .reply-to-author { font-weight: 700; color: #ffaa00; margin-bottom: 2px; }
  .reply-to-text { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Q&A Reply Style */
  .reply-bar.qa-context {
    border-left-color: var(--accent);
    background: rgba(5, 217, 232, 0.05);
  }
  .reply-bar.qa-context .reply-author-name { color: var(--accent); }

  .reply-btn-inline {
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    margin-left: 8px;
    opacity: 0;
    transition: 0.2s;
  }
  .chat-msg:hover .reply-btn-inline { opacity: 1; }
  .reply-btn-inline:hover { color: var(--accent); }

  /* ─── Empty state ─── */
  .chat-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .chat-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .chat-empty p { font-size: 14px; }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .chat-sidebar { width: 180px; min-width: 180px; }
  }
  @media (max-width: 480px) {
    .chat-sidebar { display: none; }
  }
</style>
{% endblock %}

{% block scripts %}
<script>
  if (!requireAuth()) {}

  const CHANNEL_SLUG = '{{ channel_slug }}';
  let currentChannelId = null;
  let pollTimer = null;

  async function loadChannels() {
    try {
      const channels = await apiFetch('/api/chat/channels');
      const list = document.getElementById('channelList');
      if (!channels || channels.length === 0) {
        list.innerHTML = '<p style="color:var(--text-muted);font-size:12px;padding:8px 14px;">No channels</p>';
        return;
      }
      list.innerHTML = channels.map(ch => `
        <a href="/community/channel/${ch.slug}"
           class="channel-item ${ch.slug === CHANNEL_SLUG ? 'active' : ''}">
          <span class="channel-hash">#</span>
          ${escapeHtml(ch.name)}
        </a>
      `).join('');
    } catch (err) {
      console.error('Load channels error:', err);
    }
  }

  let lastMessageId = null;
  async function loadMessages() {
    try {
      const msgs = await apiFetch(`/api/chat/channels/${CHANNEL_SLUG}/messages`);
      const container = document.getElementById('chatMessages');

      if (!msgs || msgs.length === 0) {
        if (container.innerHTML.includes('spinner')) {
          container.innerHTML = `
            <div class="chat-empty">
              <div class="empty-icon">💬</div>
              <p>No messages yet. Start the conversation!</p>
            </div>`;
        }
        return;
      }

      // Check if we already have the latest message to avoid flicker
      const newLastId = msgs[msgs.length - 1]._id;
      if (newLastId === lastMessageId) return; 
      lastMessageId = newLastId;

      container.innerHTML = msgs.map(m => {
        const initials = getInitials(m.author_name);
        const color = getAvatarColor(m.author_name);
        const isSelf = String(m.author) === String(currentUserId);
        const isAdmin = "{{ current_user.role|lower if current_user else 'student' }}" === 'admin';

        return `
        <div class="chat-msg" id="msg_${m._id}">
          <div class="msg-avatar" style="background: ${color}; color: #fff;">${initials}</div>
          <div class="msg-body">
            <div class="msg-meta" style="margin-bottom: 2px;">
              <span class="msg-author" style="color: ${color}; font-size: 12px;">${escapeHtml(m.author_name)}</span>
              <span class="msg-time" style="margin-left: 8px; opacity: 0.6;">${formatTime(m.created_at)}</span>
            </div>
            
            ${m.reply_to ? `
              <div class="msg-reply-link" onclick="scrollToMsg('${m.reply_to}')" 
                style="background: rgba(255,255,255,0.05); border-left: 2px solid ${color}; padding: 4px 8px; margin-bottom: 4px; border-radius: 4px; font-size: 11px; opacity: 0.8;">
                <div class="reply-to-text" style="color: ${color}; font-weight: 600;">@${escapeHtml(m.reply_author || 'User')}</div>
                <div style="color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(m.reply_content || '...')}</div>
              </div>
            ` : ''}

            <div class="msg-content">${escapeHtml(m.content)}</div>
          </div>

          <div style="position: relative; margin-left: auto;">
            <button class="msg-menu-btn" onclick="toggleMsgMenu('${m._id}')">⋮</button>
            <div class="msg-dropdown" id="dropdown-${m._id}">
              <a onclick="replyToMessage('${m._id}', \`${escapeHtml(m.content).replace(/'/g, "\\'")}\`, '${escapeHtml(m.author_name)}')">💬 Reply</a>
              <a onclick="openReportModal('${m._id}', 'chat_message')">🚩 Report</a>
              ${(isSelf || isAdmin) ? `<a onclick="deleteMessage('${m._id}')" class="danger">🗑️ Delete</a>` : ''}
            </div>
          </div>
        </div>
        `;
      }).join('');

      container.scrollTop = container.scrollHeight;
    } catch (err) {
      console.error('Load messages error:', err);
    }
  }

  async function loadChannelInfo() {
    try {
      const channels = await apiFetch('/api/chat/channels');
      const ch = channels.find(c => c.slug === CHANNEL_SLUG);
      if (ch) {
        document.getElementById('channelName').textContent = '# ' + ch.name;
        document.getElementById('channelDesc').textContent = ch.description || '';
        document.getElementById('chatInput').placeholder = `Reply to #${ch.name}...`;
        currentChannelId = ch._id;
      }
    } catch (err) {}
  }

  async function sendMessage(e) {
    e.preventDefault();
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) return;

    const payload = { content };
    if (replyingTo) {
      payload.reply_to_id = replyingTo;
    }
    if (qaReplyId) {
      payload.q_reply_id = qaReplyId;
    }

    input.value = '';
    cancelReply(); // Clear reply state
    
    try {
      await apiFetch(`/api/chat/channels/${CHANNEL_SLUG}/messages`, {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      await loadMessages();
    } catch (err) {
      showToast(err.message || 'Failed to send', 'error');
    }
  }

  let qaReplyId = null;

  function setReply(msgId, author, text) {
    qaReplyId = null; // Clear QA context if replying to a specific message
    replyTargetId = msgId;
    document.getElementById('replyCtx').classList.remove('qa-context');
    document.getElementById('replyAuthor').textContent = `@${author}`;
    document.getElementById('replySnippet').textContent = text;
    document.getElementById('replyCtx').style.display = 'flex';
    document.getElementById('chatInput').focus();
  }

  function setQAReply(postId, title, isOpp = false) {
    replyTargetId = null;
    qaReplyId = postId;
    document.getElementById('replyCtx').classList.add('qa-context');
    document.getElementById('replyAuthor').textContent = isOpp ? `🚀 Discussing Opportunity` : `🚀 Discussing Q&A Post`;
    document.getElementById('replySnippet').textContent = title;
    document.getElementById('replyCtx').style.display = 'flex';
    document.getElementById('chatInput').focus();
  }

  function cancelReply() {
    replyTargetId = null;
    qaReplyId = null;
    document.getElementById('replyCtx').style.display = 'none';
  }

  function scrollToMsg(id) {
    const el = document.getElementById('msg_' + id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.backgroundColor = 'rgba(5, 217, 232, 0.15)';
      setTimeout(() => el.style.backgroundColor = 'transparent', 2000);
    }
  }

  function formatTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  /* ═══ Fix 5: Avatar Helpers ═══ */
  function getInitials(name) {
    return name ? name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() : '??';
  }
  function getAvatarColor(name) {
    const colors = ['#ff2a6d','#05d9e8','#7c3aed','#f59e0b','#10b981','#ff00ff','#00ffff'];
    let hash = 0;
    for (let c of (name || '')) hash += c.charCodeAt(0);
    return colors[hash % colors.length];
  }

  /* ═══ Logic for Menus & Replies ═══ */
  function toggleMsgMenu(msgId) {
    const dropdown = document.getElementById(`dropdown-${msgId}`);
    const isShowing = dropdown.classList.contains('show');
    document.querySelectorAll('.msg-dropdown').forEach(d => d.classList.remove('show'));
    if (!isShowing) dropdown.classList.add('show');
    event.stopPropagation();
  }

  document.addEventListener('click', () => {
    document.querySelectorAll('.msg-dropdown').forEach(d => d.classList.remove('show'));
  });

  let replyingTo = null;
  function replyToMessage(msgId, msgText, senderName) {
    replyingTo = msgId;
    document.getElementById('reply-preview').style.display = 'block';
    document.getElementById('reply-text').textContent = senderName + ': ' + msgText.substring(0, 60) + (msgText.length > 60 ? '...' : '');
    document.getElementById('chatInput').focus();
  }

  function cancelReply() {
    replyingTo = null;
    document.getElementById('reply-preview').style.display = 'none';
  }

  async function deleteMessage(msgId) {
    if (!confirm('Delete this message?')) return;
    try {
      const res = await fetch(`/api/chat/messages/${msgId}`, { method: 'DELETE' });
      if (res.ok) {
        showToast('Message deleted', 'success');
        loadMessages();
      } else {
        const err = await res.json();
        showToast(err.message || 'Delete failed', 'error');
      }
    } catch(e) { showToast('Network error', 'error'); }
  }

  // Init
  loadChannels();
  loadChannelInfo();
  loadMessages();

  // Check for Q&A reply context in URL
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const qReply = params.get('q_reply');
    const qTitle = params.get('q_title');
    const isOpp = params.get('is_opp') === 'true' || window.location.pathname.includes('career-internships');
    if (qReply && qTitle) {
      setQAReply(qReply, qTitle, isOpp);
    }
  });

  // Poll every 3 seconds
  pollTimer = setInterval(loadMessages, 3000);
</script>
{% endblock %}
