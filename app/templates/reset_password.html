{% extends "base.html" %}
{% block title %}Reset Password - EDU Link Hub{% endblock %}

{% block body %}
<div class="auth-container premium-bg">
  <div class="light-trails"></div>
  
  <div class="auth-card glass-morphism animate-in">
    <div class="logo-section">
      <h1 class="logo-glow">EDU LINK HUB</h1>
      <div class="subtitle-wrapper">
        <p class="subtitle">Secure Password Reset</p>
        <div class="subtitle-line" style="width: 100%;"></div>
      </div>
    </div>

    <form id="resetForm" onsubmit="handleReset(event)" class="login-form">
      <input type="hidden" id="token" value="{{ token }}">
      
      <div class="form-group field-animate" style="--delay: 0.1s">
        <label for="new_password">New Password</label>
        <div class="input-wrapper">
          <input type="password" id="new_password" placeholder="Min 8 characters" required class="cyber-input">
          <button type="button" class="visibility-toggle" onclick="toggleVisibility('new_password', this)">👁️</button>
        </div>
      </div>
      
      <div class="form-group field-animate" style="--delay: 0.2s">
        <label for="confirm_password">Confirm New Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirm_password" placeholder="Repeat new password" required class="cyber-input">
          <button type="button" class="visibility-toggle" onclick="toggleVisibility('confirm_password', this)">👁️</button>
        </div>
      </div>
      
      <div id="reset-error" style="display:none; color:#ff4757; font-size:0.85rem; margin-bottom:20px; text-align:left;"></div>

      <button type="submit" class="btn-auth neon-glow field-animate" id="resetBtn" style="--delay: 0.3s">
        UPDATE PASSWORD
      </button>

      <div class="footer-section field-animate" style="--delay: 0.4s">
        <p><a href="/login" class="register-link">Back to Login</a></p>
      </div>
    </form>
  </div>
</div>

<style>
  :root {
    --auth-bg: #030a16;
    --card-bg: rgba(13, 27, 42, 0.4);
    --border: rgba(5, 217, 232, 0.2);
    --primary: #05d9e8;
    --accent: #ff2a6d;
    --text-muted: rgba(255, 255, 255, 0.6);
  }

  .auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: radial-gradient(circle at center, #0a192f 0%, #030a16 100%);
    position: relative;
    overflow: hidden;
  }

  .premium-bg {
    background: 
      linear-gradient(rgba(3, 10, 22, 0.8), rgba(3, 10, 22, 0.9)),
      url('https://images.unsplash.com/photo-1451187530220-4e2a13ba7ad3?q=80&w=1920&auto=format') center/cover;
  }

  .light-trails {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: 
      linear-gradient(90deg, transparent 50%, rgba(5, 217, 232, 0.05) 50%),
      linear-gradient(rgba(5, 217, 232, 0.05) 50%, transparent 50%);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  .glass-morphism {
    background: var(--card-bg);
    backdrop-filter: blur(25px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: 24px;
  }

  .auth-card {
    width: 100%;
    max-width: 440px;
    padding: 48px;
    text-align: center;
    position: relative;
    z-index: 10;
  }

  .logo-glow {
    font-size: 38px;
    font-weight: 900;
    margin: 0;
    color: white;
    font-family: 'Rajdhani', sans-serif;
    text-shadow: 0 0 15px rgba(5, 217, 232, 0.3);
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    margin-top: 8px;
    font-weight: 500;
  }

  .form-group {
    text-align: left;
    margin-bottom: 24px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .input-wrapper {
    position: relative;
  }

  .cyber-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    padding: 15px 20px;
    color: white;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
    box-sizing: border-box;
  }

  .cyber-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(5, 217, 232, 0.1);
  }

  .visibility-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
  }

  .btn-auth {
    width: 100%;
    height: 54px;
    background: linear-gradient(135deg, var(--primary), #007bff);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Rajdhani', sans-serif;
  }

  .btn-auth:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(5, 217, 232, 0.4);
  }

  .register-link {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: slideIn 0.8s ease forwards;
  }

  .field-animate {
    opacity: 0;
    animation: slideIn 0.6s ease forwards;
    animation-delay: var(--delay);
  }
</style>

<script>
  function toggleVisibility(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁️' : '🔒';
  }

  async function handleReset(e) {
    e.preventDefault();
    const token = document.getElementById('token').value;
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    const errDiv = document.getElementById('reset-error');
    const btn = document.getElementById('resetBtn');

    if (!token) {
      errDiv.textContent = 'Invalid or missing token. Please request a new link.';
      errDiv.style.display = 'block';
      return;
    }

    if (newPass.length < 8) {
      errDiv.textContent = 'Password must be at least 8 characters long.';
      errDiv.style.display = 'block';
      return;
    }

    if (newPass !== confirmPass) {
      errDiv.textContent = 'Passwords do not match.';
      errDiv.style.display = 'block';
      return;
    }

    errDiv.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'UPDATING...';

    try {
      const data = await apiFetch('/api/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({
          token: token,
          new_password: newPass
        })
      });

      if (data && !data.error) {
        showToast('Password updated! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = '/login', 2000);
      } else {
        errDiv.textContent = data?.error || 'Failed to reset password.';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'UPDATE PASSWORD';
      }
    } catch (err) {
      errDiv.textContent = 'Network error. Please try again.';
      errDiv.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'UPDATE PASSWORD';
    }
  }

  function showToast(message, type = 'info') {
    const existing = document.getElementById('login-toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.id = 'login-toast';
    toast.style.cssText = `
      position: fixed; bottom: 24px; right: 24px;
      background: #1a1a2e; color: #f0f0f0; border: 1px solid #4ecca3;
      padding: 12px 20px; border-radius: 8px; z-index: 99999;
      font-size: 0.9rem; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    `;
    toast.textContent = (type === 'success' ? '✅ ' : '🔔 ') + message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }
</script>
{% endblock %}
