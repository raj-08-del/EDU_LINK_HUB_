          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
      </div>
      <div class="logo-text">
        <h2>EDU LINK HUB</h2>
        <span>Student Network</span>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">Main</div>
      <a href="/dashboard" class="nav-item">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="/explore" class="nav-item">

        <span class="icon">💼</span> Opportunities
      </a>
      <a href="/community" class="nav-item">
        <span class="icon">💬</span> Community Q&amp;A
      </a>
      <a href="/leaderboard" class="nav-item">
        <span class="icon">🏆</span> Leaderboard
      </a>

        <span class="icon">👥</span> Study Groups
      </a>
      <a href="/bookmarks" class="nav-item">
        <span class="icon">🔖</span> Saved Items
      </a>
      <a href="/colleges" class="nav-item">
        <span class="icon">🏛️</span> Communities
      </a>
      <a href="/notifications" class="nav-item">
        <span class="icon">🔔</span> Notifications
        <span id="sidebarNotifBadge" class="sidebar-badge" style="display: none;">0</span>
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" onclick="window.location.href='/settings'" style="cursor:pointer" title="Settings">?</div>

      </button>
    </div>
  </div>
</aside>

<script>
  (function() {
    const user = getUser();
    if (user) {
      // Fetch initial counts for other Sidebar Badges (Not notifications which are handled in app.js)
      apiFetch('/api/events').then(data => {
        const badge = document.getElementById('sidebarEventBadge');
        if (badge && data && data.length > 0) {
          badge.textContent = data.length > 99 ? '99+' : data.length;
          badge.style.display = 'inline-flex';
        }
      }).catch(() => {});

      apiFetch('/api/opportunities').then(data => {
        // Look for badge if added in the future
        const badge = document.getElementById('sidebarOppBadge');
        if (badge && data && data.length > 0) {
          badge.textContent = data.length > 99 ? '99+' : data.length;
          badge.style.display = 'inline-flex';
        }
      }).catch(() => {});
    }
  })();
</script>
